<!DOCTYPE html> <!-- Informa que o documento usa HTML5 -->
<html lang="pt-BR"> <!-- Início do HTML com idioma português do Brasil -->
<head> <!-- Área de configuração da página -->
    <meta charset="UTF-8"> <!-- Permite usar acentos e caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ajusta a página para celular -->
    <title>Gerador de Senha</title> <!-- Título da aba do navegador -->
    <link rel="stylesheet" href="estilo.css"> <!-- Liga o HTML ao arquivo CSS -->
</head>
<body> <!-- Área visível da página -->
    <main class="caixa">
        <h1>GERADOR DE SENHA AUTOMÁTICO</h1>
        
        <input type="text" id="senha" placeholder="senha segura" readonly>
        <input type="number" id="quantidade" value="8"  min="1">
        <label>
            <input type="checkbox" id="minusculas" checked>
            LETRAS MINUSCÚLAS
        </label>
        <label>
            <input type="checkbox" id="maiusculas" checked>
            LETRAS MAIÚSCULAS
        </label>
        <label>
            <input type="checkbox" id="numeros" checked>
            NÚMEROS
        </label>
        <label>
            <input type="checkbox" id="especiais" checked>
            CARACTERES ESPECIAIS
        </label>
        <button onclick="criarSenha()">CRIAR SENHA</button>
        <button onclick="limparSenha()">LIMPAR</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
